<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
    <link rel="stylesheet" href="styles.css" />
    <title>DevBar</title>
  </head>
  <body class="tray">
    <div class="tray-header sticky">
      <div class="tray-header-row">
        <h1>DevBar</h1>
        <span id="app-version" class="app-version" title="Versión DevBar"></span>
        <span id="alerts-summary" class="alerts-summary"></span>
        <span class="spacer"></span>
        <button id="open-config" class="ghost">Configuración…</button>
        <button id="quit-app" class="ghost danger">Salir</button>
      </div>
    </div>
    <div id="groups" class="groups-list"></div>
    <div id="toast" style="display:none" class="toast"></div>
    <script src="format-uptime.js"></script>
    <script src="combobox.js"></script>
    <script src="tray.js"></script>
  </body>
</html>
