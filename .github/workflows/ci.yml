name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main] # only PRs targeting the main branch
    types: [opened, reopened, synchronize, ready_for_review]

# Least privilege: this pipeline only reads the repo.
permissions:
  contents: read

# One run per branch; new pushes cancel the previous in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    # Only in this repo (not forks), skip draft PRs, still allow manual runs.
    # Fork PRs that TARGET this repo still run here (github.repository is ours);
    # this only stops the workflow executing inside someone's fork.
    if: >-
      github.repository == 'juanjoGonDev/devbar' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.draft == false)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # version comes from package.json "packageManager"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm # caches the pnpm content-addressable store

      # Cache the flat node_modules itself (node-linker=hoisted makes it
      # self-contained) so installs are skipped/instant on lockfile hits.
      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      # Cache the Electron binary @electron/get downloads for `pack`.
      - name: Cache Electron download
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Checks (lint, format, dead code, deps)
        run: pnpm lint:strict && pnpm format:check && pnpm deadcode && pnpm deps:check

      - name: Tests
        run: pnpm test

      - name: Build (package app)
        run: pnpm run pack
