pre-commit:
  parallel: false
  jobs:
    - name: prettier
      run: pnpm prettier --write {staged_files}
      glob:
        - '*.{js,cjs,mjs,json,md,yml,yaml,css,html}'
      stage_fixed: true

    - name: eslint
      run: pnpm lint

pre-push:
  parallel: false
  jobs:
    - name: format-check
      run: pnpm format:check

    - name: quality
      run: pnpm quality
